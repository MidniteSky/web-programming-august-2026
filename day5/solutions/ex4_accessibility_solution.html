<!DOCTYPE html>
<!--
    EXERCISE 4 SOLUTION - the accessible version
    ============================================
    The Block 4 exercise hands you a deliberately inaccessible little contact page
    and asks you to fix it. This is the fixed version; each fix is commented with
    "FIX:" so you can see what changed and why. Run Lighthouse (F12 -> Lighthouse
    -> Accessibility) on the broken version and again on this one to see the score
    climb.

    The six fixes, from the broken original:
      1. <div class="topbar"> clickers -> real semantic landmarks + a real <button>
      2. an image with no alt          -> alt text describing it
      3. inputs with no labels          -> <label for="..."> tied to each input
      4. light-grey text on white       -> a readable dark colour
      5. an icon-only "X" button        -> aria-label + aria-hidden on the icon
      6. a fake link that was a <span>   -> a real <a> (or <button>)
-->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 4 - Accessible contact page</title>

    <!-- Bootstrap 5.3.8 CSS. LOCAL SWAP:
    <link rel="stylesheet" href="../lib/bootstrap.min.css"> -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <!-- Bootstrap Icons. LOCAL SWAP:
    <link rel="stylesheet" href="../lib/bootstrap-icons.min.css"> -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" integrity="sha384-XGjxtQfXaH2tnPFa9x+ruJTuLE3Aa6LhHSWRr1XeTyhezb4abCG4ccI5AkVDxqC+" crossorigin="anonymous">
</head>
<body>

    <!-- FIX 1: a real <header> landmark, not a styled <div>. -->
    <header class="bg-primary text-white py-3">
        <div class="container">
            <h1 class="h3 mb-0">Get in touch</h1>
        </div>
    </header>

    <!-- FIX 1 (cont.): a real <nav> landmark. -->
    <nav class="navbar navbar-expand bg-body-tertiary">
        <div class="container">
            <ul class="navbar-nav">
                <li class="nav-item"><a class="nav-link" href="#">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="#">Contact</a></li>
            </ul>
        </div>
    </nav>

    <main class="container py-4">

        <!-- FIX 5: an icon-only dismiss button with an aria-label; the icon is
             aria-hidden so it isn't announced separately. -->
        <div class="alert alert-info d-flex justify-content-between align-items-center">
            <span>We usually reply within two working days.</span>
            <button type="button" class="btn btn-sm btn-outline-secondary"
                    aria-label="Dismiss this message">
                <i class="bi bi-x-lg" aria-hidden="true"></i>
            </button>
        </div>

        <!-- FIX 2: the image has alt text describing it. -->
        <img src="../demos/images/sample-logo.svg" class="img-fluid mb-3"
             alt="Member Manager club logo" width="120">

        <h2 class="h4">Contact form</h2>
        <form class="col-md-6">
            <!-- FIX 3: every input has a <label for="..."> tied to its id. -->
            <div class="mb-3">
                <label for="cName" class="form-label">Your name</label>
                <input type="text" class="form-control" id="cName">
            </div>
            <div class="mb-3">
                <label for="cEmail" class="form-label">Your email</label>
                <input type="email" class="form-control" id="cEmail">
            </div>
            <div class="mb-3">
                <label for="cMessage" class="form-label">Message</label>
                <textarea class="form-control" id="cMessage" rows="3"></textarea>
            </div>
            <!-- FIX 1 (cont.): a real <button>, keyboard-operable for free. -->
            <button type="submit" class="btn btn-primary">Send</button>
        </form>

        <!-- FIX 4: readable dark text, not #ccc on white.
             FIX 6: a real <a>, not a <span> pretending to be a link. -->
        <p class="mt-4" style="color: #333333;">
            Prefer email? Write to
            <a href="mailto:membership@example.com">membership@example.com</a>.
        </p>

    </main>

    <footer class="bg-primary text-white py-3">
        <div class="container">
            <p class="mb-0 small">&copy; 2026 The Member Manager Club</p>
        </div>
    </footer>

    <!-- Bootstrap JS bundle. LOCAL SWAP:
    <script src="../lib/bootstrap.bundle.min.js"></script> -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

</body>
</html>
