<!DOCTYPE html>
<!--
    EXERCISE 2 SOLUTION - a modal + a toast
    =======================================
    A worked answer for the Block 2 exercise: a small page where a button opens a
    modal "add note" dialog, and saving it pops a toast. This is the exact pattern
    you fold into the capstone (add-member modal + save toast), rehearsed in
    miniature. Both components need Bootstrap's JS bundle.
-->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 2 - Modal + toast</title>

    <!-- Bootstrap 5.3.8 CSS. LOCAL SWAP:
    <link rel="stylesheet" href="../lib/bootstrap.min.css"> -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>

    <main class="container py-4">

        <h1 class="mb-3">My notes</h1>

        <!-- Opens the modal declaratively. -->
        <button type="button" class="btn btn-primary"
                data-bs-toggle="modal" data-bs-target="#noteModal">
            Add a note
        </button>

        <!-- Notes get listed here. -->
        <ul id="noteList" class="mt-3"></ul>

    </main>

    <!-- The add-note modal. The form wraps body + footer so submit works. -->
    <div class="modal fade" id="noteModal" tabindex="-1"
         aria-labelledby="noteModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <form id="noteForm">
                    <div class="modal-header">
                        <h2 class="modal-title h5" id="noteModalLabel">Add a note</h2>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"
                                aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <label for="noteText" class="form-label">Note</label>
                        <input type="text" class="form-control" id="noteText">
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary"
                                data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-primary">Save</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- The toast, pinned bottom-right. -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3">
        <div id="noteToast" class="toast" role="alert" aria-live="polite" aria-atomic="true">
            <div class="toast-header">
                <strong class="me-auto">Notes</strong>
                <button type="button" class="btn-close" data-bs-dismiss="toast"
                        aria-label="Close"></button>
            </div>
            <div class="toast-body" id="toastBody">Saved.</div>
        </div>
    </div>

    <!-- Bootstrap JS bundle - modals and toasts REQUIRE it. LOCAL SWAP:
    <script src="../lib/bootstrap.bundle.min.js"></script> -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

    <script>
        /* Controllers for the modal and toast. */
        const noteModal = new bootstrap.Modal(document.querySelector("#noteModal"));
        const noteToast = new bootstrap.Toast(document.querySelector("#noteToast"));
        const toastBody = document.querySelector("#toastBody");

        const noteForm = document.querySelector("#noteForm");
        const noteText = document.querySelector("#noteText");
        const noteList = document.querySelector("#noteList");

        noteForm.addEventListener("submit", (event) => {
            event.preventDefault();

            const text = noteText.value.trim();
            if (text === "") {
                return;
            }

            /* Add the note to the list (createElement + textContent - the safe
               habit, since it's text a user typed). */
            const item = document.createElement("li");
            item.textContent = text;
            noteList.append(item);

            /* Tidy up: close the modal, clear the field, pop the toast. */
            noteModal.hide();
            noteForm.reset();
            toastBody.textContent = `Saved "${text}".`;
            noteToast.show();
        });
    </script>

</body>
</html>
