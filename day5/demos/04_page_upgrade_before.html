<!DOCTYPE html>
<!--
    04 - PAGE UPGRADE: BEFORE
    =========================
    A plain little "club events" page, hand-styled the Day 1/2 way with a small
    stylesheet in a <style> block. There is nothing wrong with it - you can build
    all of this yourself now, which is the whole point of the week.

    Open this file, then open 05_page_upgrade_after.html side by side. They have
    almost the SAME HTML. The "after" version deletes this custom CSS and reaches
    for Bootstrap classes instead. Watch what changes - and, more tellingly, what
    doesn't (the content and structure are identical).
-->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>04 - Before</title>

    <!-- Our own hand-written styles. Modest, but it's all us. -->
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            color: #333333;
            line-height: 1.6;
            margin: 0;
        }
        header {
            background-color: #1d5c8f;
            color: #ffffff;
            padding: 1rem 1.5rem;
        }
        nav a {
            color: #ffffff;
            margin-right: 1rem;
            text-decoration: none;
        }
        main {
            max-width: 900px;
            margin: 0 auto;
            padding: 1.5rem;
        }
        .event {
            border: 1px solid #d0c9b8;
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 1rem;
        }
        button {
            background-color: #1d5c8f;
            color: #ffffff;
            border: none;
            border-radius: 4px;
            padding: 0.5rem 1rem;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <header>
        <h1>The Club</h1>
        <nav>
            <a href="#">Home</a>
            <a href="#">Events</a>
            <a href="#">About</a>
        </nav>
    </header>

    <main>
        <h2>Upcoming events</h2>

        <div class="event">
            <h3>Monthly meetup</h3>
            <p>First Tuesday of the month. Everyone welcome.</p>
            <button type="button">Book a place</button>
        </div>

        <div class="event">
            <h3>Summer social</h3>
            <p>An afternoon in the park, weather permitting (it won't).</p>
            <button type="button">Book a place</button>
        </div>
    </main>

</body>
</html>
